
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育てるノート CMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#f5d547;
  --navy:#1a2847;
  --orange:#e8722a;
  --cream:#fffef5;
  --text:#1a1a1a;
  --border:#e8e4d8;
  --shadow:0 2px 18px rgba(26,40,71,.10);
  --radius:18px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--cream);
  color:var(--text);
}

.header{
  background:var(--navy);
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  color:var(--yellow);
  font-size:26px;
  font-weight:900;
  font-family:'M PLUS Rounded 1c',sans-serif;
}

.logo span{
  display:block;
  color:white;
  font-size:11px;
  opacity:.7;
}

.layout{
  width:min(1500px,calc(100% - 40px));
  margin:24px auto;
  display:grid;
  grid-template-columns:380px 1fr;
  gap:20px;
}

.sidebar{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.card{
  background:white;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  border-left:6px solid var(--yellow);
}

.orange{
  border-left-color:var(--orange);
}

.title{
  font-size:13px;
  font-weight:900;
  margin-bottom:14px;
  color:#666;
  letter-spacing:.08em;
}

input,textarea,select{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:2px solid var(--border);
  font-family:inherit;
  margin-bottom:12px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  border:none;
  border-radius:14px;
  padding:13px;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
}

.btn-main{
  background:var(--navy);
  color:var(--yellow);
}

.btn-orange{
  background:var(--orange);
  color:white;
}

.btn-light{
  background:#f5f5f5;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.question-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:70vh;
  overflow:auto;
}

.question-item{
  background:white;
  border-radius:16px;
  padding:14px;
  border-left:6px solid var(--yellow);
  box-shadow:var(--shadow);
  cursor:pointer;
}

.question-item.active{
  outline:3px solid var(--orange);
}

.qid{
  font-weight:900;
  color:var(--navy);
  margin-bottom:6px;
}

.qcat{
  font-size:12px;
  color:#777;
  margin-bottom:8px;
}

.tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tag{
  background:#fff5d1;
  color:var(--navy);
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.stat{
  background:#fafaf2;
  border-radius:16px;
  padding:14px;
  text-align:center;
}

.stat b{
  display:block;
  font-size:24px;
  color:var(--navy);
}

.main{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.empty{
  color:#777;
  text-align:center;
  padding:40px;
}

.helper{
  font-size:12px;
  color:#777;
  line-height:1.8;
}

@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }

  .row{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    育てるノート
    <span>CMS管理ツール</span>
  </div>

  <button class="btn-main" onclick="downloadJson()">
    JSONを書き出す
  </button>
</header>

<div class="layout">

  <aside class="sidebar">

    <div class="card">
      <div class="title">📂 QUESTIONS.JSON</div>

      <input type="file" id="jsonFile" accept=".json">

      <div class="helper">
        questions.json を読み込むと問題一覧が表示されます
      </div>
    </div>

    <div class="card orange">
      <div class="title">📊 管理状況</div>

      <div class="stats">
        <div class="stat">
          <span>問題数</span>
          <b id="countAll">0</b>
        </div>

        <div class="stat">
          <span>タグ無し</span>
          <b id="countTag">0</b>
        </div>

        <div class="stat">
          <span>note無し</span>
          <b id="countNote">0</b>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="title">🔍 検索</div>

      <input id="searchBox" placeholder="タグ・問題ID・カテゴリー検索">

      <div class="helper">
        例：病理 / pt52 / 脳卒中
      </div>
    </div>

    <div class="card orange">
      <div class="title">📚 問題一覧</div>

      <div class="question-list" id="questionList"></div>
    </div>

  </aside>

  <main class="main">

    <div class="card orange">

      <div class="title">➕ 新しい問題を追加</div>

      <div class="row">
        <input id="newId" placeholder="問題ID">
        <input id="newCategory" placeholder="カテゴリー">
      </div>

      <textarea id="newQuestion" placeholder="問題文"></textarea>

      <textarea id="newChoices" placeholder="選択肢（1行ごと）"></textarea>

      <div class="row">
        <input id="newAnswer" placeholder="正答">
        <input id="newTags" placeholder="タグ（カンマ区切り）">
      </div>

      <input id="newNote" placeholder="関連note URL">

      <button class="btn-orange" onclick="addProblem()">
        問題を追加
      </button>

    </div>

    <div class="card">

      <div class="title">✏️ 問題編集</div>

      <div id="empty" class="empty">
        左の問題を選択してください
      </div>

      <div id="editor" style="display:none">

        <div class="row">
          <input id="editId">
          <input id="editCategory">
        </div>

        <textarea id="editQuestion"></textarea>

        <textarea id="editChoices"></textarea>

        <div class="row">
          <input id="editAnswer">
          <input id="editTags">
        </div>

        <input id="editNote">

        <textarea id="editExplanation" placeholder="解説"></textarea>

        <div class="row">
          <button class="btn-main" onclick="saveProblem()">
            保存
          </button>

          <button class="btn-light" onclick="addKokushi()">
            国試頻出追加
          </button>
        </div>

      </div>

    </div>

    <div class="card orange">

      <div class="title">🧠 CMSの使い方</div>

      <div class="helper">
        ① questions.json を読み込む<br>
        ② 左の問題一覧から選択<br>
        ③ タグ・note・解説を編集<br>
        ④ 保存を押す<br>
        ⑤ JSONを書き出す<br>
        ⑥ GitHubへアップロード
      </div>

    </div>

  </main>

</div>

<script>

let problems = [];
let currentIndex = null;

document.getElementById('jsonFile').addEventListener('change', loadJson);
document.getElementById('searchBox').addEventListener('input', renderList);

function loadJson(e){

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    problems = JSON.parse(event.target.result);

    updateStats();
    renderList();

    alert("questions.json を読み込みました！");
  }

  reader.readAsText(file);

}

function renderList(){

  const box = document.getElementById('questionList');

  box.innerHTML = '';

  const search =
    document.getElementById('searchBox')
      .value
      .toLowerCase();

  problems.forEach((p,index)=>{

    const text = JSON.stringify(p).toLowerCase();

    if(search && !text.includes(search)) return;

    const div = document.createElement('div');

    div.className = 'question-item';

    if(index === currentIndex){
      div.classList.add('active');
    }

    div.innerHTML = `
      <div class="qid">${p.id || 'IDなし'}</div>

      <div class="qcat">
        ${p.category || 'カテゴリー未設定'}
      </div>

      <div class="tags">
        ${(p.tags || [])
          .map(t=>`<span class="tag">${t}</span>`)
          .join('')}
      </div>
    `;

    div.onclick = ()=>openProblem(index);

    box.appendChild(div);

  });

}

function openProblem(index){

  currentIndex = index;

  const p = problems[index];

  document.getElementById('empty').style.display = 'none';
  document.getElementById('editor').style.display = '';

  document.getElementById('editId').value = p.id || '';
  document.getElementById('editCategory').value = p.category || '';
  document.getElementById('editQuestion').value = p.question || '';

  document.getElementById('editChoices').value =
    (p.choices || []).join('\n');

  document.getElementById('editAnswer').value =
    p.answer || '';

  document.getElementById('editTags').value =
    (p.tags || []).join(', ');

  document.getElementById('editNote').value =
    p.note?.url || '';

  document.getElementById('editExplanation').value =
    p.explanation || '';

  renderList();

}

function saveProblem(){

  if(currentIndex === null) return;

  const p = problems[currentIndex];

  p.id =
    document.getElementById('editId').value;

  p.category =
    document.getElementById('editCategory').value;

  p.question =
    document.getElementById('editQuestion').value;

  p.choices =
    document.getElementById('editChoices')
      .value
      .split('\n')
      .filter(Boolean);

  p.answer =
    document.getElementById('editAnswer').value;

  p.tags =
    document.getElementById('editTags')
      .value
      .split(',')
      .map(t=>t.trim())
      .filter(Boolean);

  p.note = {
    url:
      document.getElementById('editNote').value
  };

  p.explanation =
    document.getElementById('editExplanation').value;

  updateStats();
  renderList();

  alert("保存しました！");

}

function addProblem(){

  const newProblem = {

    id:
      document.getElementById('newId').value,

    category:
      document.getElementById('newCategory').value,

    question:
      document.getElementById('newQuestion').value,

    choices:
      document.getElementById('newChoices')
        .value
        .split('\n')
        .filter(Boolean),

    answer:
      document.getElementById('newAnswer').value,

    tags:
      document.getElementById('newTags')
        .value
        .split(',')
        .map(t=>t.trim())
        .filter(Boolean),

    note:{
      url:
        document.getElementById('newNote').value
    },

    explanation:''
  };

  problems.unshift(newProblem);

  updateStats();
  renderList();

  alert("新しい問題を追加しました！");

}

function addKokushi(){

  let tags =
    document.getElementById('editTags')
      .value
      .split(',')
      .map(t=>t.trim())
      .filter(Boolean);

  if(!tags.includes('国試頻出')){
    tags.push('国試頻出');
  }

  document.getElementById('editTags').value =
    tags.join(', ');

}

function updateStats(){

  document.getElementById('countAll').textContent =
    problems.length;

  document.getElementById('countTag').textContent =
    problems.filter(p=>!p.tags || p.tags.length===0).length;

  document.getElementById('countNote').textContent =
    problems.filter(p=>!p.note || !p.note.url).length;

}

function downloadJson(){

  const blob = new Blob(
    [JSON.stringify(problems,null,2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);

  a.download = 'questions.json';

  a.click();

}

</script>

</body>
</html>
