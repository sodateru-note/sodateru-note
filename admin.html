
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育てるノート CMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#f5d547;
  --yellow-light:#fff5c4;
  --navy:#1a2847;
  --navy-light:#2d4070;
  --orange:#e8722a;
  --orange-light:#fdeee3;
  --teal:#3ab5b5;
  --cream:#fffef5;
  --warm:#fafaf2;
  --text:#1a1a1a;
  --soft:#666;
  --border:#e8e4d8;
  --shadow:0 2px 16px rgba(26,40,71,.10);
  --radius:18px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--cream);
  color:var(--text);
}

.header{
  background:var(--navy);
  padding:16px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-family:'M PLUS Rounded 1c',sans-serif;
  color:var(--yellow);
  font-size:28px;
  font-weight:900;
  line-height:1;
}

.logo span{
  display:block;
  font-size:11px;
  color:rgba(255,255,255,.6);
  margin-top:4px;
}

.header-actions{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  border-radius:14px;
  padding:12px 18px;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
}

.btn-main{
  background:var(--yellow);
  color:var(--navy);
}

.btn-orange{
  background:var(--orange);
  color:white;
}

.layout{
  width:min(1700px,calc(100% - 32px));
  margin:18px auto;
  display:grid;
  grid-template-columns:340px 1fr 300px;
  gap:18px;
}

.card{
  background:white;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  border-left:6px solid var(--yellow);
}

.orange{
  border-left-color:var(--orange);
}

.teal{
  border-left-color:var(--teal);
}

.title{
  font-size:13px;
  font-weight:900;
  color:var(--soft);
  margin-bottom:14px;
  letter-spacing:.08em;
}

input,textarea,select{
  width:100%;
  border:2px solid var(--border);
  border-radius:14px;
  padding:13px;
  font-family:inherit;
  font-size:14px;
  margin-bottom:12px;
  background:white;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.sidebar,
.rightbar,
.main{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.problem-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:70vh;
  overflow:auto;
}

.problem{
  background:white;
  border-radius:16px;
  padding:14px;
  box-shadow:var(--shadow);
  border-left:5px solid var(--yellow);
  cursor:pointer;
}

.problem.active{
  outline:3px solid var(--orange);
}

.pid{
  font-weight:900;
  color:var(--navy);
  margin-bottom:6px;
}

.pcat{
  font-size:12px;
  color:var(--soft);
  margin-bottom:8px;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tag{
  background:var(--yellow-light);
  color:var(--navy);
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:var(--warm);
  border-radius:16px;
  padding:14px;
  text-align:center;
}

.stat b{
  display:block;
  font-size:28px;
  color:var(--navy);
}

.helper{
  font-size:12px;
  color:var(--soft);
  line-height:1.8;
}

.empty{
  text-align:center;
  color:var(--soft);
  padding:50px 20px;
}

.badge{
  display:inline-block;
  background:var(--orange-light);
  color:var(--orange);
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  margin:4px;
}

@media(max-width:1200px){
  .layout{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header class="header">

  <div class="logo">
    育てるノート
    <span>CMS管理ツール</span>
  </div>

  <div class="header-actions">
    <button class="btn btn-main" onclick="downloadJson()">
      JSONを書き出す
    </button>
  </div>

</header>

<div class="layout">

  <aside class="sidebar">

    <div class="card">
      <div class="title">📂 QUESTIONS.JSON</div>

      <input type="file" id="jsonFile" accept=".json">

      <div class="helper">
        現在使用している questions.json を読み込んでください。
      </div>
    </div>

    <div class="card orange">

      <div class="title">🔍 検索</div>

      <input id="searchBox" placeholder="問題ID・タグ・カテゴリー">

    </div>

    <div class="card teal">

      <div class="title">📚 問題一覧</div>

      <div class="problem-list" id="problemList"></div>

    </div>

  </aside>

  <main class="main">

    <div class="card orange">

      <div class="title">➕ 新しい問題を追加</div>

      <div class="row">
        <input id="newId" placeholder="問題ID">
        <select id="newType">
          <option value="common">共通問題</option>
          <option value="special">専門問題</option>
        </select>
      </div>

      <div class="row">
        <input id="newCategory" placeholder="カテゴリー">
        <input id="newAnswer" placeholder="正答">
      </div>

      <textarea id="newQuestion" placeholder="問題文"></textarea>

      <textarea id="newChoices" placeholder="選択肢（1行ごと）"></textarea>

      <input id="newTags" placeholder="タグ（カンマ区切り）">

      <input id="newNote" placeholder="note URL">

      <textarea id="newExplanation" placeholder="解説"></textarea>

      <button class="btn btn-orange" onclick="addProblem()">
        問題を追加
      </button>

    </div>

    <div class="card">

      <div class="title">✏️ 問題編集</div>

      <div id="empty" class="empty">
        左の問題を選択してください
      </div>

      <div id="editor" style="display:none">

        <div class="row">
          <input id="editId">
          <input id="editCategory">
        </div>

        <textarea id="editQuestion"></textarea>

        <textarea id="editChoices"></textarea>

        <div class="row">
          <input id="editAnswer">
          <input id="editTags">
        </div>

        <input id="editNote">

        <textarea id="editExplanation"></textarea>

        <div class="row">
          <button class="btn btn-main" onclick="saveProblem()">
            保存
          </button>

          <button class="btn btn-orange" onclick="addKokushi()">
            国試頻出追加
          </button>
        </div>

      </div>

    </div>

  </main>

  <aside class="rightbar">

    <div class="card">

      <div class="title">📊 管理状況</div>

      <div class="stats">

        <div class="stat">
          <span>問題数</span>
          <b id="countAll">0</b>
        </div>

        <div class="stat">
          <span>タグ無し</span>
          <b id="countTag">0</b>
        </div>

        <div class="stat">
          <span>note無し</span>
          <b id="countNote">0</b>
        </div>

        <div class="stat">
          <span>カテゴリ数</span>
          <b id="countCat">0</b>
        </div>

      </div>

    </div>

    <div class="card orange">

      <div class="title">🏷 タグ統計</div>

      <div id="tagStats"></div>

    </div>

    <div class="card teal">

      <div class="title">🧠 CMSの使い方</div>

      <div class="helper">
        ① questions.json を読み込む<br>
        ② 問題一覧から選択<br>
        ③ タグ・note・解説を編集<br>
        ④ 保存<br>
        ⑤ JSONを書き出す<br>
        ⑥ GitHubへアップロード
      </div>

    </div>

  </aside>

</div>

<script>

let DB = null;
let flatQuestions = [];
let currentQuestion = null;

document.getElementById('jsonFile').addEventListener('change', loadJson);
document.getElementById('searchBox').addEventListener('input', renderList);

function loadJson(e){

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    DB = JSON.parse(event.target.result);

    flattenQuestions();

    renderList();

    updateStats();

    alert('questions.json を読み込みました！');

  }

  reader.readAsText(file);

}

function flattenQuestions(){

  flatQuestions = [];

  Object.entries(DB.questions).forEach(([cat,qs])=>{

    qs.forEach(q=>{

      flatQuestions.push({
        ...q,
        category:cat
      });

    });

  });

}

function renderList(){

  const box = document.getElementById('problemList');

  box.innerHTML = '';

  const search =
    document.getElementById('searchBox')
      .value
      .toLowerCase();

  flatQuestions.forEach(q=>{

    const text = JSON.stringify(q).toLowerCase();

    if(search && !text.includes(search)) return;

    const div = document.createElement('div');

    div.className = 'problem';

    if(currentQuestion && currentQuestion.id === q.id){
      div.classList.add('active');
    }

    div.innerHTML = `
      <div class="pid">${q.id}</div>

      <div class="pcat">${q.category}</div>

      <div class="tags">
        ${(q.tags || []).slice(0,4)
          .map(t=>`<span class="tag">${t}</span>`)
          .join('')}
      </div>
    `;

    div.onclick = ()=>openQuestion(q);

    box.appendChild(div);

  });

}

function openQuestion(q){

  currentQuestion = q;

  document.getElementById('empty').style.display = 'none';
  document.getElementById('editor').style.display = '';

  document.getElementById('editId').value = q.id || '';
  document.getElementById('editCategory').value = q.category || '';
  document.getElementById('editQuestion').value = q.text || q.question || '';

  document.getElementById('editChoices').value =
    (q.choices || []).join('\n');

  document.getElementById('editAnswer').value =
    Array.isArray(q.answer)
      ? q.answer.join(',')
      : q.answer || '';

  document.getElementById('editTags').value =
    (q.tags || []).join(', ');

  document.getElementById('editNote').value =
    q.noteUrl || q.canvaUrl || '';

  document.getElementById('editExplanation').value =
    q.explanation || '';

  renderList();

}

function saveProblem(){

  if(!currentQuestion) return;

  const category =
    document.getElementById('editCategory').value;

  const target =
    DB.questions[currentQuestion.category]
      .find(x=>x.id===currentQuestion.id);

  target.id =
    document.getElementById('editId').value;

  target.text =
    document.getElementById('editQuestion').value;

  target.choices =
    document.getElementById('editChoices')
      .value
      .split('\n')
      .filter(Boolean);

  target.answer =
    document.getElementById('editAnswer')
      .value
      .split(',')
      .map(x=>Number(x.trim()));

  target.tags =
    document.getElementById('editTags')
      .value
      .split(',')
      .map(x=>x.trim())
      .filter(Boolean);

  target.canvaUrl =
    document.getElementById('editNote').value;

  target.explanation =
    document.getElementById('editExplanation').value;

  if(category !== currentQuestion.category){

    DB.questions[currentQuestion.category] =
      DB.questions[currentQuestion.category]
        .filter(x=>x.id!==currentQuestion.id);

    if(!DB.questions[category]){
      DB.questions[category] = [];
    }

    DB.questions[category].push(target);

  }

  flattenQuestions();

  renderList();

  updateStats();

  alert('保存しました！');

}

function addProblem(){

  if(!DB){
    alert('先にquestions.jsonを読み込んでください');
    return;
  }

  const category =
    document.getElementById('newCategory').value;

  if(!DB.questions[category]){
    DB.questions[category] = [];
  }

  const q = {

    id:
      document.getElementById('newId').value,

    text:
      document.getElementById('newQuestion').value,

    choices:
      document.getElementById('newChoices')
        .value
        .split('\n')
        .filter(Boolean),

    answer:
      document.getElementById('newAnswer')
        .value
        .split(',')
        .map(x=>Number(x.trim())),

    tags:
      document.getElementById('newTags')
        .value
        .split(',')
        .map(x=>x.trim())
        .filter(Boolean),

    canvaUrl:
      document.getElementById('newNote').value,

    explanation:
      document.getElementById('newExplanation').value

  };

  DB.questions[category].push(q);

  flattenQuestions();

  renderList();

  updateStats();

  alert('問題を追加しました！');

}

function updateStats(){

  document.getElementById('countAll').textContent =
    flatQuestions.length;

  document.getElementById('countTag').textContent =
    flatQuestions.filter(q=>!q.tags || q.tags.length===0).length;

  document.getElementById('countNote').textContent =
    flatQuestions.filter(q=>!q.canvaUrl).length;

  document.getElementById('countCat').textContent =
    Object.keys(DB.questions).length;

  buildTagStats();

}

function buildTagStats(){

  const stats = {};

  flatQuestions.forEach(q=>{

    (q.tags || []).forEach(t=>{

      stats[t] = (stats[t] || 0) + 1;

    });

  });

  const sorted =
    Object.entries(stats)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,20);

  document.getElementById('tagStats').innerHTML =
    sorted.map(([tag,count])=>
      `<div class="badge">${tag} (${count})</div>`
    ).join('');

}

function addKokushi(){

  let tags =
    document.getElementById('editTags')
      .value
      .split(',')
      .map(x=>x.trim())
      .filter(Boolean);

  if(!tags.includes('国試頻出')){
    tags.push('国試頻出');
  }

  document.getElementById('editTags').value =
    tags.join(', ');

}

function downloadJson(){

  const blob = new Blob(
    [JSON.stringify(DB,null,2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);

  a.download = 'questions.json';

  a.click();

}

</script>

</body>
</html>
